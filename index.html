<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Today</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cardo:ital,wght@0,400;0,700;1,400&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>  
</head>
<body>
  <header>
    <h1>Weather Right Now</h1>
  </header>
  <main>
    <div class="search-bar">
      <form id="search-weather-form" action="get">
        <label for="location"></label>
        <input type="text" id="search-weather-input">
      </form>
    </div>
    <div class="weather-container">
      <div class="weather-hero-container"><span id="weather-hero-text">London</span></div>
      <img id="sunny" src="image/sunny.jpg" alt="sunny and clear sky"> 
      <div class="weather-footer-container">
        <span id="temperature">100 &deg;C</span>
        <span id="condition">Partially cloudy</span>
    </div>
  </main>
</body>
</html>
